version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blueprint-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
      - ./backend/routes:/app/routes
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - blueprint-network
    restart: unless-stopped
    command: node server.js

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blueprint-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    networks:
      - blueprint-network
    restart: unless-stopped

networks:
  blueprint-network:
    driver: bridge
